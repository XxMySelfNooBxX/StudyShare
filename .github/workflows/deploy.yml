name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Build Backend
        run: cd server && npm install && npm run build

      - name: Build Frontend
        run: cd client && npm install && npm run build

      - name: Deploy
        run: echo "Deploying to production (Vercel/Railway handled via branch push or CLI)"
